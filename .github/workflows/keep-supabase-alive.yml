name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 */4 * *'  # every 4 days at noon UTC
  workflow_dispatch:         # allow manual trigger from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -s \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/phases?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          echo "Supabase pinged successfully"
